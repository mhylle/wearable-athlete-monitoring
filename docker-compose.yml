# Wearable Athlete Monitoring Platform - Docker Compose
# Includes our services + Open Wearables as sibling services

services:
  # ─── Our Platform Services ────────────────────────────────────────────

  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: wearable
      POSTGRES_PASSWORD: wearable
      POSTGRES_DB: wearable
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - wearable-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wearable"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wearable-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://wearable:wearable@db:5432/wearable
      REDIS_URL: redis://redis:6379/0
      OW_API_URL: http://ow-backend:8000
      OW_API_KEY: ${OW_API_KEY:-dev-api-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEBUG: "true"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wearable-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8001/health'); assert r.status_code == 200"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://wearable:wearable@db:5432/wearable
      REDIS_URL: redis://redis:6379/0
      OW_API_URL: http://ow-backend:8000
      OW_API_KEY: ${OW_API_KEY:-dev-api-key}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wearable-net

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://wearable:wearable@db:5432/wearable
      REDIS_URL: redis://redis:6379/0
      OW_API_URL: http://ow-backend:8000
      OW_API_KEY: ${OW_API_KEY:-dev-api-key}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wearable-net

  # ─── Open Wearables Services (Built from source) ─────────────────────

  ow-db:
    image: postgres:18
    environment:
      POSTGRES_USER: open-wearables
      POSTGRES_PASSWORD: open-wearables
      POSTGRES_DB: open-wearables
    volumes:
      - ow_db_data:/var/lib/postgresql
    networks:
      - wearable-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open-wearables -d open-wearables"]
      interval: 5s
      timeout: 5s
      retries: 5

  ow-redis:
    image: redis:8
    volumes:
      - ow_redis_data:/var/lib/redis/data
    networks:
      - wearable-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ow-backend:
    build:
      context: ./open-wearables/backend
      dockerfile: Dockerfile
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/app.sh
    env_file:
      - ./open-wearables/backend/config/.env
    environment:
      - DB_HOST=ow-db
      - REDIS_HOST=ow-redis
      - ENVIRONMENT=local
    ports:
      - "8000:8000"
    depends_on:
      ow-db:
        condition: service_healthy
      ow-redis:
        condition: service_healthy
    networks:
      - wearable-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/docs'); assert r.status_code == 200"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: on-failure

  ow-celery-worker:
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/worker.sh
    env_file:
      - ./open-wearables/backend/config/.env
    environment:
      - DB_HOST=ow-db
      - REDIS_HOST=ow-redis
    depends_on:
      ow-db:
        condition: service_healthy
      ow-redis:
        condition: service_healthy
      ow-backend:
        condition: service_started
    networks:
      - wearable-net

  ow-celery-beat:
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/beat.sh
    env_file:
      - ./open-wearables/backend/config/.env
    environment:
      - DB_HOST=ow-db
      - REDIS_HOST=ow-redis
    depends_on:
      ow-db:
        condition: service_healthy
      ow-redis:
        condition: service_healthy
      ow-backend:
        condition: service_started
    networks:
      - wearable-net

networks:
  wearable-net:
    driver: bridge

volumes:
  db_data:
  redis_data:
  ow_db_data:
  ow_redis_data:
